name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # @earendil-works/pi-* require node >=22.19.
          node-version: "22"
          cache: npm

      - name: Install dependencies
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == dependabot/* ]]; then
            npm install
          else
            npm ci
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Lint (Obsidian plugin rules)
        run: npm run lint:obsidian

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            jq -r '
              .total |
              to_entries[] |
              select(.value.pct != null) |
              "| \(.key | ascii_upcase) | \(.value.pct)% |"
            ' coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No coverage summary generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Production build
        run: npm run build
