name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # @earendil-works/pi-* require node >=22.19.
          node-version: "22"
          cache: npm

      - name: Install dependencies
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == dependabot/* ]]; then
            npm install
          else
            npm ci
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Lint (Obsidian plugin rules)
        run: npm run lint:obsidian

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
